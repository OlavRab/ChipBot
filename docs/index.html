<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChipBot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .logo { font-size: 2.5rem; font-weight: 800; color: #fff; margin-bottom: .5rem; }
    .logo span { color: #9b7db5; }
    p { color: #888; margin-bottom: 2rem; }
    .buttons { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2rem; }
    .btn-add { display: inline-block; background: #5865F2; color: #fff; font-size: 1rem; font-weight: 600; padding: .75rem 1.75rem; border-radius: 8px; text-decoration: none; transition: background .15s; }
    .btn-add:hover { background: #4752c4; }
    .btn-upload { display: inline-block; background: #9b7db5; color: #fff; font-size: 1rem; font-weight: 600; padding: .75rem 1.75rem; border-radius: 8px; text-decoration: none; transition: background .15s; }
    .btn-upload:hover { background: #7a5f94; }
    .links { display: flex; gap: 1.5rem; }
    a { color: #9b7db5; text-decoration: none; font-size: .95rem; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="logo">Chip<span>Bot</span></div>
  <p>Your custom Discord soundboard</p>
  <div class="buttons">
    <a class="btn-add" href="https://discord.com/oauth2/authorize?client_id=784119635536379914" target="_blank" rel="noopener">Add to Server</a>
    <a class="btn-upload" href="https://chipbot-production.up.railway.app" target="_blank" rel="noopener">Upload Sounds</a>
  </div>
  <div class="links">
    <a href="tos.html">Terms of Service</a>
    <a href="privacy.html">Privacy Policy</a>
  </div>
</body>
</html>
